name: Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, without the leading v
        required: true
        default: "0.3.0"
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true
  PROJECT_PATH: src/RoslynMcpServer/RoslynMcpServer.csproj

jobs:
  publish:
    name: Publish ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            extension: zip
          - os: ubuntu-latest
            rid: linux-x64
            extension: tar.gz
          - os: macos-15-intel
            rid: osx-x64
            extension: tar.gz
          - os: macos-latest
            rid: osx-arm64
            extension: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Resolve version
        shell: pwsh
        run: |
          $version = "${{ inputs.version }}".Trim()
          if ([string]::IsNullOrWhiteSpace($version)) {
              $version = "${{ github.ref_name }}".Trim()
          }

          if ($version.StartsWith("v", [StringComparison]::OrdinalIgnoreCase)) {
              $version = $version.Substring(1)
          }

          if ($version -notmatch '^\d+\.\d+\.\d+(-[0-9A-Za-z.-]+)?$') {
              throw "Release version must look like 0.3.0 or 0.3.0-preview.1, got '$version'."
          }

          $packageName = "roslyn-mcp-server-v$version-${{ matrix.rid }}"
          "VERSION=$version" >> $env:GITHUB_ENV
          "PACKAGE_NAME=$packageName" >> $env:GITHUB_ENV

      - name: Publish
        shell: pwsh
        run: |
          $publishDir = Join-Path $env:GITHUB_WORKSPACE "artifacts/publish/${{ matrix.rid }}"
          dotnet publish $env:PROJECT_PATH `
              -c Release `
              -r ${{ matrix.rid }} `
              --self-contained true `
              -p:PublishSingleFile=true `
              -p:IncludeNativeLibrariesForSelfExtract=true `
              -p:DebugType=None `
              -p:DebugSymbols=false `
              -p:Version=$env:VERSION `
              -p:InformationalVersion=$env:VERSION `
              -o $publishDir

      - name: Verify published executable
        shell: pwsh
        run: |
          $publishDir = Join-Path $env:GITHUB_WORKSPACE "artifacts/publish/${{ matrix.rid }}"
          $executableName = if ($IsWindows) { "roslyn-mcp-server.exe" } else { "roslyn-mcp-server" }
          $executable = Join-Path $publishDir $executableName
          if (!(Test-Path $executable)) {
              throw "Published executable was not found: $executable"
          }

          if (!$IsWindows) {
              chmod +x $executable
          }

          & $executable --help

      - name: Package artifact
        shell: pwsh
        run: |
          $publishDir = Join-Path $env:GITHUB_WORKSPACE "artifacts/publish/${{ matrix.rid }}"
          $packageDir = Join-Path $env:GITHUB_WORKSPACE "artifacts/packages"
          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null

          $assetName = "$env:PACKAGE_NAME.${{ matrix.extension }}"
          $packagePath = Join-Path $packageDir $assetName
          if ("${{ matrix.extension }}" -eq "zip") {
              Compress-Archive -Path (Join-Path $publishDir "*") -DestinationPath $packagePath -Force
          }
          else {
              tar -czf $packagePath -C $publishDir .
          }

          "ASSET_NAME=$assetName" >> $env:GITHUB_ENV
          "PACKAGE_PATH=$packagePath" >> $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET_NAME }}
          path: ${{ env.PACKAGE_PATH }}
          if-no-files-found: error

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: publish
    if: github.ref_type == 'tag'

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Create release notes
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          {
            echo "## v${version}"
            echo
            echo "### Added"
            echo
            echo "- Multi-OS release artifacts for Windows x64, Linux x64, macOS x64, and macOS arm64."
            echo
            echo "### Known issues"
            echo
            echo "- \`roslyn-language-server\` is still installed separately and is not bundled in the release artifacts."
            echo "- Large repositories can remain in \`WorkspaceWarming\` while Roslyn LS loads projects."
            echo "- Diagnostics reflect currently processed \`textDocument/publishDiagnostics\` notifications, not a full build."
          } > release-notes.md

      - name: Create GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mapfile -t assets < <(find dist -type f | sort)
          gh release create "$GITHUB_REF_NAME" "${assets[@]}" \
              --title "$GITHUB_REF_NAME" \
              --notes-file release-notes.md \
              --verify-tag

name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true

jobs:
  build:
    name: Build and test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Install Roslyn language server
        run: dotnet tool install --global roslyn-language-server --prerelease

      - name: Add .NET tools to PATH (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: '"$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append'

      - name: Add .NET tools to PATH (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Restore
        run: dotnet restore roslyn-mcp-server.sln

      - name: Check formatting
        run: dotnet format roslyn-mcp-server.sln --verify-no-changes --no-restore

      - name: Build
        run: dotnet build roslyn-mcp-server.sln --no-restore

      - name: Test
        run: dotnet test tests/RoslynMcpServer.Tests/RoslynMcpServer.Tests.csproj --no-restore
